name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest

      - name: Send Discord Alert
        if: always()
        run: |
          curl -H "Content-Type: application/json" \
          -d '{"content":"Pipeline executado - Testes passaram na PR com alerta Discord"}' \
          ${{ secrets.DISCORD_WEBHOOK }}
